<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChatNotion automatic backup</title>
  <link rel="stylesheet" href="backup.css">
</head>
<body>
  <main>
    <div class="logo" aria-hidden="true"><span></span><span></span><span></span></div>
    <p class="eyebrow">CHATNOTION</p>
    <h1>Choose a backup folder</h1>
    <p>Automatic backups will be written only to the folder you choose. Your files never leave this device and ChatNotion doesn't see your data.</p>
    <button id="choose-folder" type="button">Choose folder</button>
    <p id="status" class="status" role="status"></p>
  </main>
  <script src="auto-backup.js"></script>
  <script src="backup.js"></script>
</body>
</html>
